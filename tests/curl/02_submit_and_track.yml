- name: Submit a real catering job
  request:
    method: POST
    url: /jobs
    headers:
      Content-Type: application/json
    body:
      event: "Corporate Gala Dinner"
      date: "2025-03-15"
      venue: "Grand Ballroom"
      guest_count_estimate: 150
      categories:
        appetizers:
          - name: "Bruschetta"
            description: "Grilled bread topped with fresh tomatoes, basil, garlic, and olive oil"
            service_style: "passed"
  expect:
    status: 201
    body:
      job_id: any_uuid
      status: "pending"

- name: Check job status immediately
  depends_on: "Submit a real catering job"
  request:
    method: GET
    url: /jobs/${prev.job_id}
  expect:
    status: 200
    body:
      job_id: any_uuid
      status: any_string
      total_items: 1
